name: harbor
description: >
  Harbor — a premium, privacy-first personal media vault for iPhone.
  Not intended for App Store distribution.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management, DI, routing (single system — see architecture notes)
  get: ^4.6.6

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.4.3+1

  # Link resolvers
  youtube_explode_dart: ^2.2.1
  html: ^0.15.4

  # Media playback
  video_player: ^2.9.1
  just_audio: ^0.9.40
  chewie: ^1.8.3

  # Media save destinations
  photo_manager: ^3.2.4
  share_plus: ^9.0.0
  permission_handler: ^11.3.1

  # Network state (Wi-Fi Only downloads setting)
  connectivity_plus: ^6.0.5

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  logger: ^2.3.0
  shared_preferences: ^2.2.3
  # Note: the Share Extension bridge is hand-rolled (native App Group +
  # MethodChannel, see ios/Runner/ShareChannelHandler.swift) rather than
  # via a third-party plugin — see ios/SETUP.md for why.

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
